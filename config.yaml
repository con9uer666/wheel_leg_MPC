# =============================================================================
# 轮腿机器人 — MPC / LQR 调参文件
# =============================================================================
# 仿真启动时一次性加载本文件。改完任意值后重启仿真即可生效，无需改 Python 代码。
#
# 注意：本文件只放“控制器调参”，机器人本身的物理参数（质量、转动惯量、几何
# 尺寸）请放在 controllers/params.py，两者职责分离。
#
# 文件章节：
#   mpc       — MPC 控制器（controllers/mpc10.py）
#   lqr       — LQR 基线控制器（controllers/lqr10.py）
#   leg_pd    — 腿长 PD 律（LQR 和 MPC 共用）
#   actuator  — 电机扭矩饱和限幅
#   osqp      — OSQP 求解器设置（MPC 专用）
#   signs     — 状态向量与输出向量的极性约定
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────
# MPC 控制器
# ─────────────────────────────────────────────────────────────────────────
mpc:
  # 预测步数 N
  # 含义：每次解算，MPC 在 N 个未来时间步上做规划，找最优的 N 个扭矩序列。
  #      典型值 10-30。预测时域 = N × DT 秒。
  # 调大（>30）：MPC 看得更远，对未来扰动预判能力增强，但 OSQP 求解会变慢；
  #             可能超过 2ms 预算导致 500Hz 跑不到。
  # 调小（<10）：求解快，但近视，遇到剧烈扰动时缺乏前瞻能力可能震荡。
  N:       20

  # 单步预测时长 DT（秒）
  # 含义：MPC 内部线性化模型的离散化步长，也是预测时域内每一步代表的时间。
  #      必须等于 sim/runner.py 的 DT_CTRL（也是 MuJoCo 物理步 0.002s）。
  # 调大（如 0.005）：MPC 看得更远但建模精度变差。强不稳定模态（+15.6 极点，
  #                  时间常数约 64ms）会让 0.005s 的离散误差快速放大。
  # 调小：物理步本身就是 0.002s，没有更小的意义。
  DT:      0.002

  # 锁定的腿长（米）
  # 含义：MPC 在这个腿长处对动力学做一次线性化，A、B 矩阵在整个仿真过程中不变。
  #      腿长 PD 律会把实际腿长强制保持在此值附近。
  # 范围：0.14 ~ 0.18（model10.py 在此范围内插值过物理参数；超出范围
  #      LEG_TABLE 只有 0.15 一行，行为未定义）。
  # 调大（>0.15）：机身重心抬高，pitch 控制更敏感；可能需要重调 Q[8] 才稳。
  # 调小（<0.15）：机身降低，更接近“小板凳”形态，扰动恢复能力略增但 yaw 力矩臂变小。
  LEG_LEN: 0.15

  # 状态权重 Q（10 维对角阵）
  # 状态向量顺序：[s, ds, phi, dphi, theta_ll, dtheta_ll, theta_lr, dtheta_lr, theta_b, dtheta_b]
  #              [位移, 速度, 偏航, 偏航速率, 左腿角, 左腿角速度, 右腿角, 右腿角速度, 俯仰, 俯仰速率]
  # 含义：每一项权重 q_i 代表“这个状态偏离参考时，MPC 多么不能容忍”。
  #      越大表示越优先把这个状态拉回参考。
  #
  # 经典调参经验（适合本机器人）：
  #   q_s   = 10       —— 位移漂移容忍度较高（机器人允许移动）
  #   q_ds  = 300      —— 速度偏差较敏感
  #   q_phi = 5000     —— 偏航跟踪权重较大
  #   q_dphi= 1        —— 偏航速率本身基本不约束
  #   q_tll, q_tlr = 5000 —— 左右腿角度希望接近垂直（防止甩腿）
  #   q_dtll, q_dtlr = 1  —— 腿角速率不约束
  #   q_tb  = 25000    —— 俯仰角是平衡核心，最大权重
  #   q_dtb = 1        —— 俯仰速率本身不约束
  #
  # 调大 q_tb（如 50000）：俯仰更稳但容易过激，遇大扰动可能震荡。
  # 调小 q_tb（如 10000）：响应温和但被推后回正较慢。
  # 调大 q_phi（如 10000）：yaw 跟踪更准但同时给到的轮子差速扭矩更大。
  # 调大 q_tll/tlr（如 10000）：腿更稳定不甩动，但抗扰时机器人“硬扛”不会用腿摆动卸力。
  # 调小 q_tll/tlr（如 100）：腿可以大幅摆动来卸力，但容易甩飞。
  Q: [10.0, 300.0, 5000.0, 1.0,
      5000.0, 1.0, 5000.0, 1.0,
      25000.0, 1.0]

  # 输入权重 R（4 维对角阵）
  # 输入向量顺序：[T_wl, T_wr, T_bl, T_br]
  #              [左轮扭矩, 右轮扭矩, 左髋扭矩, 右髋扭矩]
  # 含义：r_i 代表“多大力气抵制使用这个执行器”。越大越省力（懒）。
  #
  # 当前值含义：
  #   r_wheel = 40     —— 轮子扭矩限制较大，MPC 不爱使大轮扭矩
  #   r_hip   = 1      —— 髋关节扭矩限制较小，MPC 可以自由使用髋关节
  #
  # 调大 r_wheel（如 100）：轮子扭矩输出更小，速度响应更慢但更平滑。
  # 调小 r_wheel（如 10）：轮子可以猛冲，加速更快但起停容易俯仰震荡。
  # 调大 r_hip（如 10）：髋关节用得少，机器人更倾向于用轮子调姿；可能不够灵敏。
  # 调小 r_hip（如 0.1）：髋关节会“甩”得更猛，容易把腿甩到极限位置导致翻车。
  R: [40.0, 40.0, 1.0, 1.0]


# ─────────────────────────────────────────────────────────────────────────
# LQR 控制器（基线对照用）
# ─────────────────────────────────────────────────────────────────────────
lqr:
  # K 矩阵（4×10）
  # 含义：LQR 的反馈律 u = -K @ x，固定增益。在 MATLAB LQR.m 里用 icare 算出来的。
  #      行：[T_wl, T_wr, T_bl, T_br]
  #      列：10 维状态向量
  # 注意：K 是给当前 Q、R、A、B 配套的。如果改了 mpc 的 Q/R，不会自动重算 LQR 的 K
  #      ——LQR 还是用这里这版。需要重算 K 时，请在 MATLAB 里重跑 LQR.m。
  K:
    - [-0.22494, -1.4517, -7.1367, -1.1802, -8.9838, -0.63815, -4.1141, -0.42777, -12.874, -1.4493]
    - [-0.22494, -1.4517,  7.1367,  1.1802, -4.1141, -0.42777, -8.9838, -0.63815, -12.874, -1.4493]
    - [ 1.7251,  10.998,  -21.51,  -3.7978, 67.911,   3.8477,  -7.9052,  0.33238, -74.067, -2.5312]
    - [ 1.7251,  10.998,   21.51,   3.7978, -7.9052,  0.33238, 67.911,   3.8477, -74.067, -2.5312]


# ─────────────────────────────────────────────────────────────────────────
# 腿长 PD 控制器（LQR 和 MPC 都用）
# ─────────────────────────────────────────────────────────────────────────
leg_pd:
  # 腿长 PD 控制律：F_leg = K_P * (L_ref - L) - K_D * L_dot + FF
  #   F_leg : 沿腿杆方向的力（N），施加在 MuJoCo 的 slide 关节上
  #   L_ref : 腿长目标值（由 h_ref 经几何换算得到，目标 0.15m）
  #   L     : 当前腿长
  #   L_dot : 腿长变化速率（伸长方向为正）

  # 比例增益 K_P（N/m）
  # 含义：腿长每偏离目标 1m，回正力增加 K_P 牛顿。
  # 调大（>5000）：腿长跟踪更紧，静态时 L 更接近 0.15m。
  #               但腿太硬会传导冲击到机身，扰动恢复反而变差，可能 ±30N 推就翻。
  # 调小（<2000）：腿“软”一些，扰动时腿可以微微伸缩卸力，机身更稳，但腿长偏差更大。
  K_P: 2500.0

  # 微分增益 K_D（N·s/m）
  # 含义：腿长伸缩速率每 1m/s，反向力增加 K_D 牛顿（阻尼项）。
  # 调大（>200）：腿伸缩更平稳，但响应变慢。
  # 调小（<50）：腿伸缩可能震荡（弹簧效应）。
  # 经验值：K_D ≈ 2 * sqrt(K_P * m_leg) ≈ 0.05 * K_P（临界阻尼附近）。
  K_D: 120.0

  # 前馈力 FF（N）
  # 含义：抵消重力或预补偿的额外推力。
  # 当前值：0（关闭前馈）。MuJoCo 的 slide 关节 damping=5 已经被动处理重力。
  # 调大（如 70）：腿长稳态误差减小（更靠近 0.15），但太大（如 80）会和 LQR 髋关节
  #              扭矩耦合产生不稳定，机器人会被持续顶起来翻倒。
  # 通常保持 0；如果需要更精准的腿长跟踪，先小步加（5, 10, 20...）观察是否还稳定。
  FF:  0.0


# ─────────────────────────────────────────────────────────────────────────
# 执行器扭矩限幅
# ─────────────────────────────────────────────────────────────────────────
actuator:
  # 扭矩上下限 U_MAX：MPC 会把它编进 QP 约束；LQR 输出后做硬限幅。
  # 顺序：[T_wl, T_wr, T_bl, T_br]
  #      [左轮上限, 右轮上限, 左髋上限, 右髋上限]
  # 单位：N·m
  #
  # 这里的数值必须 ≤ models/wheel_legged.xml 里 actuator 的 forcerange，
  # 否则仿真会把超出部分自动截断，控制律会跟实际偏离。
  # 当前 XML 设置：wheel forcerange="-30 30"，hip forcerange="-15 15"
  #
  # 调大（如轮子 50）：扰动时可输出更猛的回正扭矩，抗扰能力增强。需要同时
  #                  增大 XML 里的 forcerange，不然仿真里实际还是 30。
  # 调小（如轮子 15）：执行器“低饱和”，MPC 会更早遇到约束，可能在大扰动下失效。
  U_MAX: [30.0, 30.0, 15.0, 15.0]


# ─────────────────────────────────────────────────────────────────────────
# OSQP 求解器（MPC 内部用）
# ─────────────────────────────────────────────────────────────────────────
osqp:
  # 这一段是 OSQP 内部的数值求解控制参数。一般不用改，改错了可能让 MPC 跑不通。
  # 不熟悉求解器原理时建议保持默认。

  # 最大迭代次数
  # 含义：单次 QP 求解的迭代次数上限。达到上限就停（可能没收敛）。
  # 调大（>5000）：求解更彻底但单次时间变长。
  # 调小（<200）：求解快但容易未收敛，控制律质量下降。
  max_iter:     2000

  # 收敛容差 eps_abs / eps_rel
  # 含义：当 KKT 残差绝对值 < eps_abs 或相对值 < eps_rel 时认为求解成功。
  # 调大（如 1e-2）：求解更快（25 步左右），但解更粗糙。
  # 调小（如 1e-5）：解更精确但单次可能要 5-10ms，跑不到 500Hz。
  # 当前 1e-3 是 P50≈0.3ms、P99≈5ms 的甜点。
  eps_abs:      1.0e-3
  eps_rel:      1.0e-3

  # rho 参数
  # 含义：OSQP 的内部 ADMM 步长。
  # 调大（如 5.0）：约束方向收敛更快，但目标函数方向收敛慢。
  # 调小（如 0.01）：反过来。
  # 0.5 是经验上对本问题的近似最优值。
  rho:          0.5

  # 是否自适应调整 rho
  # 含义：true 时 OSQP 内部会动态调 rho 提高收敛速度。
  # 但 warm-start 模式下开 adaptive_rho 会破坏上一拍的预求解状态，
  # 反而让 iter 数飙升到 1000+。所以保持 false。
  adaptive_rho: false

  # 是否做 polish（额外的精化求解）
  # 含义：true 时在迭代收敛后再用一次精确求解“抛光”结果，精度更高。
  # 关掉省 0.5-1ms，对控制律影响很小。
  polish:       false

  # 是否启用 warm start
  # 含义：true 时用上一拍的解作为本次的初始点。MPC 控制因为状态连续变化，
  # 上一拍的解通常很接近本次解，warm start 能把 iter 数从 250 降到 50 以下。
  # 强烈建议保持 true。
  warm_start:   true


# ─────────────────────────────────────────────────────────────────────────
# 极性约定
# ─────────────────────────────────────────────────────────────────────────
signs:
  # 这一段处理“MATLAB 状态空间”和“MuJoCo 物理空间”之间的方向差异。
  # 通常不需要改，除非你换了机器人的物理建模（比如 yaw 正方向翻转、
  # MuJoCo 模型里左右轮调换之类）。
  #
  # 状态极性：MPC 和 LQR 内部用的状态 = SIGN_* * extract_state 给出的值
  # 输出极性：MuJoCo ctrl 里写入的 = SIGN_OUT * 控制律输出的扭矩
  #
  # 这套值是通过在 MuJoCo 里 64 种组合暴力网格搜索确认的，能让用户的 MATLAB K
  # 矩阵和重新建好的 model10 都在 MuJoCo 里平衡。
  #
  # 改这里的风险：一个符号反了，机器人会立刻翻倒。
  # 验证方法：改完后跑 30 秒静态平衡 + 5° yaw 初始扰动恢复，两个都要稳。

  S:        +1   # x[0,1]  = SIGN_S        * (s, ds)         位移和速度极性
  PHI:      -1   # x[2,3]  = SIGN_PHI      * (yaw, dyaw)     偏航极性
  THETA_LL: +1   # x[4..7] = SIGN_THETA_LL * (hipL, dhipL, hipR, dhipR) 髋角极性
  THETA_B:  -1   # x[8,9]  = SIGN_THETA_B  * (pitch, dpitch) 俯仰极性
  HIP_OUT:  +1   # MuJoCo 髋扭矩 = HIP_OUT * 控制律算出的 T_bl
  WHL_OUT:  -1   # MuJoCo 轮扭矩 = WHL_OUT * 控制律算出的 T_wl
